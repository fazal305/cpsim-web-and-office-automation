<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Depth Parallax</title>
    <link rel="stylesheet" href="stellar-depth-styles.css">
</head>
<body>
    <div class="parallax-hero" id="hero-layer">
        <div class="hero-text">
            <h1>Beyond the Horizon</h1>
            <p>A beginner-friendly parallax journey.</p>
        </div>
    </div>
    <section class="info-block">
        <h2>How it Works</h2>
        <p>The background image moves at a different speed than your scroll, creating an illusion of 3D depth.</p>
    </section>
    <div class="parallax-footer" id="footer-layer">
        <h2>End of the Road</h2>
    </div>
    <script src="stellar-depth-logic.js"></script>
</body>
</html>
