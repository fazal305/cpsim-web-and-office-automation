<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Registration Form</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        form {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        fieldset {
            border: 1.5px solid #e1e4e8;
            border-radius: 8px;
            padding: 20px;
        }

        legend {
            font-weight: 600;
            color: #1a73e8;
            padding: 0 10px;
            font-size: 1.1rem;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #3c4043;
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #dadce0;
            border-radius: 6px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #1a73e8;
        }

        .inline-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .inline-group label {
            margin-bottom: 0;
            display: inline;
        }

        input[type="submit"] {
            background-color: #1a73e8;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: #1557b0;
        }
    </style>
</head>

<body>
    <form>
        <fieldset>
            <legend>Registration</legend>
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter username" required>
            <label for="pwd">Password</label>
            <input type="password" id="pwd" name="pwd" placeholder="••••••••" required>
            <label>Gender</label>
            <div class="inline-group">
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>
            </div>
            <div class="inline-group">
                <input type="checkbox" id="van" name="van" value="yes">
                <label for="van">Do you have a van?</label>
            </div>
            <label for="class">Select Class</label>
            <select id="class" name="class">
                <option value="10th">10th Grade</option>
                <option value="11th">11th Grade</option>
                <option value="12th">12th Grade</option>
            </select>
            <input type="submit" value="Submit Registration" onclick="alert('Form submitted successfully!')">
        </fieldset>
    </form>
</body>

</html>
