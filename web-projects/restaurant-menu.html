<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cozy Corner Menu</title>
    <link rel="stylesheet" href="menu_styles.css">
</head>
<body>

    <header>
        <h1>The Cozy Corner</h1>
        <p>Delicious food, served fresh every day.</p>
        <button id="specialBtn">View Today's Special</button>
    </header>

    <main class="menu-grid">
        
        <div class="menu-card">
            <img src="Classic Burger.jfif" alt="Classic Burger">
            <div class="card-content">
                <h3>Classic Burger</h3>
                <p>Juicy beef patty with lettuce, tomato, and our secret sauce.</p>
                <span class="price">$12.99</span>
            </div>
        </div>

        <div class="menu-card">
            <img src="Garden Salad.jfif" alt="Garden Salad">
            <div class="card-content">
                <h3>Garden Salad</h3>
                <p>Fresh greens, cucumbers, and balsamic vinaigrette.</p>
                <span class="price">$9.50</span>
            </div>
        </div>

        <div class="menu-card">
            <img src="Margherita Pizza.jfif" alt="Margherita Pizza">
            <div class="card-content">
                <h3>Margherita Pizza</h3>
                <p>Classic thin crust with mozzarella and fresh basil.</p>
                <span class="price">$14.00</span>
            </div>
        </div>
    </main>

    <script src="menu_logic.js"></script>
</body>
</html>
