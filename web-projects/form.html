<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>form</title>
</head>

<body>
    <b>This is a simple form:</b><br>
    <strong>My Form</strong><br>
    <i>Form</i><br>
    <em>Form</em><br>
    <mark>Form</mark><br>
    <small>Form</small><br>
    <del>Form</del><br>
    <ins>Form</ins><br>
    <sub>Form</sub><br>
    <sup>Form</sup><br>
    <blockquote>Form</blockquote><br>
    <q>Form</q><br>
    <abbr>Form</abbr><br>
    <address>Form</address><br>
    <cite>Form</cite><br>
    <bdo>Form</bdo><br>
    <iframe>Form</iframe>
    <form action="">
        <fieldset>
            <legend>Personal Information</legend>
        <label for="name">enter your name:</label><br>
        <input type="text" name="name" id="name"><br>
        <input type="submit" value="submit"><br>
        <label for="password">enter your password:</label><br>
        <input type="password" name="password" id="password"><br>
        <input type="submit" value="submit"><br>
        <span>choose your gender:</span><br>
        <input type="radio" name="gender" id="male">
        <label for="male">male </label><br>
        <input type="radio" name="gender" id="female">
        <label for="female"> female </label><br>
        <br>
        <input type="checkbox" name="vehicle" id="car">
        <label for="car">I have a car</label><br>
        </fieldset>
    </form>
    <label for="">select your class</label>
    <select name="class" id="class">
        <option value="class1">class 1</option>
        <option value="class2">class 2</option>
        <option value="class3">class 3</option>
    </select>
    <input type="submit"><br><br>
    <label for="message">enter your message:</label><br>
    <textarea rows="4" cols="50" id="message"></textarea>
    <input type="submit" onclick="alert('This is my webpage')" value="Click Me"><br><br>
</body>

</html>
