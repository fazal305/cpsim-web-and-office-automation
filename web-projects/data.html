<!-- write a data example in html with internal inline and external CSS styles. -->
 <!DOCTYPE html>
<html lang="en">  
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CSS Example</title>
        <link rel="stylesheet" href=""C:\CPISM\CSS\data.css"">
    </head>  
<body>
    <h1 style="color: blue;">This is an example of internal CSS</h1>
    <p>This paragraph is styled using internal CSS.</p>

    <style>
        p {
            color: green;
            font-size: 18px;
        }
    </style>
    <h2 class="external-style">This is an example of external CSS</h2>
    <p class="external-style">This paragraph is styled using external CSS.</p>
</body>
</html>
