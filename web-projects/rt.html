<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resistance Trench</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f9f9f9;
      color: #222;
    }

    /* Navbar */
    nav {
      background: #b40000; /* deep red */
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem 2rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .logo {
      font-size: 1.4rem;
      font-weight: bold;
      color: #fff;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
    }

    .nav-links a {
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      transition: 0.3s ease;
      position: relative;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      width: 0%;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: #fff;
      transition: width 0.3s;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    /* Hero Section */
    .hero {
      height: 70vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1504711434969-e33886168f5c') no-repeat center/cover;
      color: #fff;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1.2rem;
      max-width: 600px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .nav-links {
        display: none;
        flex-direction: column;
        background: #b40000;
        position: absolute;
        top: 60px;
        right: 0;
        width: 200px;
        padding: 1rem;
      }
      .nav-links.active {
        display: flex;
      }
      .menu-toggle {
        display: block;
        cursor: pointer;
        color: #fff;
        font-size: 1.5rem;
      }
    }

    .menu-toggle {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <div class="logo">ResistanceTrench</div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <div class="nav-links" id="navLinks">
      <a href="#">ResistanceTrench</a>
      <a href="#">Current News</a>
      <a href="#">Geopolitics</a>
      <a href="#">Contact Us</a>
      <a href="#">Telegram Link</a>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div>
      <h1>Welcome to Resistance Trench</h1>
      <p>Your source for authentic updates, analysis, and insights from the resistance frontlines.</p>
    </div>
  </section>

  <script>
    function toggleMenu() {
      document.getElementById('navLinks').classList.toggle('active');
    }
  </script>

</body>
</html>
