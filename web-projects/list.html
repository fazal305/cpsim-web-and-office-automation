<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list</title>
</head>

<body>
    <h1>Unordered List</h1>
    <ul>
        <li>Cofee</li>
        <li>Milk</li>
    </ul>
    <ul style="list-style-type: circle;">
        <li>Tea</li>
        <li>Cofee</li>
        <li>Milk</li>
    </ul>
    <ul style="list-style-type: square;">
        <li>Tea</li>
        <li>Cofee</li>
        <li>Milk</li>
    </ul>
    <h2>Ordered List</h2>
    <ol>
        <li>Tea</li>
        <li>Cofee</li>
        <li>Milk</li>
        </ol>
        <ol type="A">
            <li>Tea</li>
            <li>Cofee</li>
            <li>Milk</li>
        </ol>
        <ol type="1">
            <li>Tea</li>
            <li>Cofee</li>
            <li>Milk</li>
        </ol>
        <ol type="1">
            <li>Tea</li>
            <li>Cofee</li>
            <li>Milk</li>
        </ol>
        <ol type="a">
            <li>Tea</li>
            <li>Cofee</li>
            <li>Milk</li>
        </ol>
</body>
