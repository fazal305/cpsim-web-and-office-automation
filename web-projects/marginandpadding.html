<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>margin and padding</title>
    <style>
        .box1 {

            width: 300px;
            height: 300px;
            background-color: green;
            border: 2px solid red;
            margin: 50px;
            margin: 60px 75px;
            padding: 40px;
            padding-left: 50px;
            padding-top: 80px;
        }

        .box2 {
            width: 750px;
            height: 600px;
            border-radius: 50%;
            height: 300px;
            background-color: green;
            border: 2px solid green;
            margin-top: 40px;
            margin-left: 100px;
            padding: 40px;
        }
    </style>
</head>

<body>
    <div class="box1">
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Culpa repudiandae sapien </p>
    </div>
    <div class="box2">
        <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Odio unde et voluptatum</p>
    </div>
</body>

</html>
